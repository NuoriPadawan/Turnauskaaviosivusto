<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnaustaulukko</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1> Turnaustaulukko</h1>

        <div class="setup-section">
            <input type="number" id="participantCount" min="2" max="128" value="8" placeholder="Osallistujamäärä">
            <button onclick="setupTournament()">Luo turnaus</button>
        </div>

        <div class="teams-section" id="teamsSection">
            <h2 class="teams-heading">Syötä joukkueiden/osallistujien nimet:</h2>
            <div class="teams-grid" id="teamsGrid"></div>
            <button class="start-button" onclick="startTournament()">Aloita turnaus</button>
            <div class="error" id="error"></div>
        </div>

        <div class="bracket-container" id="bracketContainer">
            <div class="bracket" id="bracket"></div>
        </div>

        <div class="winner-section" id="winnerSection">
            <div class="winner-announcement" id="winnerText"></div>
            <button class="reset-button" onclick="resetTournament()">Uusi turnaus</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
